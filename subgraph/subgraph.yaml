specVersion: 1.0.0
description: MatchPulse Hook and TWCL event indexer for X Layer.
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MatchPulseHook
    network: xlayer-testnet
    source:
      address: "0x0a3f08bf50ac0c2dc82e3c759afd3ceb2634ef9b"
      abi: MatchPulseHook
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - DynamicFeeApplied
        - LiquidityBandRebalanced
        - SwapMeasured
        - PoolSnapshot
      abis:
        - name: MatchPulseHook
          file: ./abis/MatchPulseHook.json
      eventHandlers:
        - event: DynamicFeeApplied(indexed bytes32,indexed bytes32,uint24,uint256,string)
          handler: handleDynamicFeeApplied
        - event: LiquidityBandRebalanced(indexed bytes32,indexed bytes32,uint16,int24,int24,string)
          handler: handleLiquidityBandRebalanced
        - event: SwapMeasured(indexed bytes32,uint256,uint256,uint256)
          handler: handleSwapMeasured
      file: ./src/mapping.ts
