type DynamicFeeApplied @entity(immutable: true) {
  id: Bytes!
  poolId: Bytes!
  matchId: Bytes!
  feeBps: BigInt!
  volatilityScore: BigInt!
  reason: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type LiquidityBandRebalanced @entity(immutable: true) {
  id: Bytes!
  poolId: Bytes!
  matchId: Bytes!
  concentrationBps: BigInt!
  activeTick: BigInt!
  tickLower: BigInt!
  tickUpper: BigInt!
  vaultCreditBps: BigInt!
  reason: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ActiveLiquidityRebalanced @entity(immutable: true) {
  id: Bytes!
  poolId: Bytes!
  matchId: Bytes!
  sender: Bytes!
  activeTick: BigInt!
  tickLower: BigInt!
  tickUpper: BigInt!
  concentrationBps: BigInt!
  reason: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SwapMeasured @entity(immutable: true) {
  id: Bytes!
  poolId: Bytes!
  volumeUsd: BigInt!
  totalVolumeUsd: BigInt!
  swapCount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type PoolSnapshot @entity {
  id: Bytes!
  matchId: Bytes
  lastFeeBps: BigInt
  lastVolatilityScore: BigInt
  lastConcentrationBps: BigInt
  lastActiveTick: BigInt
  lastTickLower: BigInt
  lastTickUpper: BigInt
  lastVaultCreditBps: BigInt
  positionRebalanceCount: BigInt
  totalVolumeUsd: BigInt
  swapCount: BigInt
  lastReason: String
  updatedAt: BigInt!
}
